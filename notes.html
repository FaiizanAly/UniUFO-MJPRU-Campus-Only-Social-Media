<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="UniUFO — Your Campus, Your Community. MJPRU Bareilly students platform.">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Notes | UniUFO</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    @media(max-width:1100px){.notes-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){.notes-grid{grid-template-columns:1fr}}
    .note-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-xl);padding:20px;transition:box-shadow .2s,transform .2s}
    .note-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
    .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border-light);cursor:pointer;transition:all .15s}
    .chip:hover{background:var(--accent-blue-light);color:var(--accent-blue)}
    .chip.active{background:var(--accent-blue);color:white;border-color:var(--accent-blue)}
    .input-field{width:100%;padding:10px 14px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;transition:border-color .2s}
    .input-field:focus{outline:none;border-color:var(--accent-blue)}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--bg-card);border-radius:var(--radius-2xl);padding:32px;width:100%;max-width:480px;box-shadow:var(--shadow-xl);max-height:90vh;overflow-y:auto}
    .tag-pill{display:inline-flex;align-items:center;padding:2px 8px;background:var(--bg-secondary);color:var(--text-secondary);border-radius:999px;font-size:11px;font-weight:500;border:1px solid var(--border-light);}
    .star-rating{color:#ff9f0a;font-size:13px;letter-spacing:1px;}
    .toast{position:fixed;bottom:24px;right:24px;background:#1c1c1e;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);transform:translateY(20px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>
<main style="padding-top:56px;min-height:100vh;background:var(--bg-primary);">
  <div class="app-shell" style="max-width:1200px;margin:0 auto;">
    <div class="sidebar" id="sidebar" style="background:var(--bg-secondary);"></div>
    <div class="main-content" style="padding:24px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div>
          <h1 style="font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;">📖 Study Notes</h1>
          <p style="font-size:14px;color:var(--text-secondary);margin-top:2px;">MJPRU student-shared study resources</p>
        </div>
        <button onclick="document.getElementById('upload-modal').classList.add('open')" style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">
          <i data-lucide="upload" style="width:16px;height:16px;"></i> Upload Notes
        </button>
      </div>
      <!-- Search -->
      <div style="position:relative;margin-bottom:16px;">
        <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-tertiary);"></i>
        <input id="search-input" type="text" class="input-field" placeholder="Search notes by title, subject, or tag..." style="padding-left:38px;" oninput="filterNotes()">
      </div>
      <!-- Filter chips -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;" id="chips">
        <span class="chip active" data-f="All">All Semesters</span>
        <span class="chip" data-f="Sem 1">Sem 1</span>
        <span class="chip" data-f="Sem 2">Sem 2</span>
        <span class="chip" data-f="Sem 3">Sem 3</span>
        <span class="chip" data-f="Sem 4">Sem 4</span>
      </div>
      <div class="notes-grid" id="grid"></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="upload-modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 style="font-size:20px;font-weight:700;">Upload Study Notes</h2>
      <button onclick="document.getElementById('upload-modal').classList.remove('open')" style="background:var(--bg-secondary);border:none;cursor:pointer;color:var(--text-secondary);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <i data-lucide="x" style="width:16px;height:16px;"></i>
      </button>
    </div>
    <div class="form-group"><label class="form-label">Notes Title *</label><input type="text" class="input-field" placeholder="e.g. Data Structures Complete Notes Sem 3"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">Subject Code *</label><input type="text" class="input-field" placeholder="e.g. MCA-301"></div>
      <div class="form-group"><label class="form-label">Semester *</label>
        <select class="input-field"><option>Sem 1</option><option>Sem 2</option><option>Sem 3</option><option>Sem 4</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Upload File *</label>
      <div style="border:2px dashed var(--border-medium);border-radius:var(--radius-md);padding:24px;text-align:center;cursor:pointer;background:var(--bg-secondary);">
        <i data-lucide="file-text" style="width:32px;height:32px;color:var(--text-tertiary);margin:0 auto 8px;display:block;"></i>
        <div style="font-size:13px;color:var(--text-secondary);">Click to upload PDF or click to drag &amp; drop</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px;">PDF, DOC, PPT up to 20MB</div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Tags</label><input type="text" class="input-field" placeholder="e.g. DSA, C, MCA (comma separated)"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button onclick="document.getElementById('upload-modal').classList.remove('open')" style="flex:1;padding:12px;background:var(--bg-secondary);color:var(--text-primary);border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
      <button onclick="submitUpload()" style="flex:1;padding:12px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">Upload Notes</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
let currentFilter='All';
function stars(r){
  const full=Math.floor(r);const half=r%1>=0.5?1:0;const empty=5-full-half;
  return '★'.repeat(full)+(half?'⯨':'')+'☆'.repeat(empty);
}
function renderGrid(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const g=document.getElementById('grid');
  let list=notes;
  if(currentFilter!=='All')list=list.filter(n=>n.semester===currentFilter);
  if(q)list=list.filter(n=>n.title.toLowerCase().includes(q)||n.subject.toLowerCase().includes(q)||n.tags.some(t=>t.toLowerCase().includes(q)));
  if(!list.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-tertiary);"><div style="font-size:48px;">📭</div><p style="margin-top:12px;font-size:16px;font-weight:600;">No notes found</p></div>';return;}
  g.innerHTML=list.map(n=>`
    <div class="note-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="background:var(--accent-blue-light);color:var(--accent-blue);padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;">${n.subject}</span>
        <span style="background:var(--bg-secondary);color:var(--text-secondary);padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid var(--border-light);">${n.semester}</span>
      </div>
      <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:12px;line-height:1.4;">${n.title}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div style="width:28px;height:28px;border-radius:50%;background:${n.uploader.avatarColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;">${n.uploader.initials}</div>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text-primary);">${n.uploader.name}${n.uploader.verified?' <span style="color:#0071e3;font-size:10px;">✓</span>':''}</div>
          <div style="font-size:11px;color:var(--text-tertiary);">${n.time}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;text-align:center;">
        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:8px;">
          <div style="font-size:16px;font-weight:700;color:var(--text-primary);">${n.pages}</div>
          <div style="font-size:10px;color:var(--text-tertiary);">Pages</div>
        </div>
        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:8px;">
          <div style="font-size:16px;font-weight:700;color:var(--text-primary);">${n.size}</div>
          <div style="font-size:10px;color:var(--text-tertiary);">Size</div>
        </div>
        <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:8px;">
          <div style="font-size:16px;font-weight:700;color:var(--text-primary);">${n.downloads}</div>
          <div style="font-size:10px;color:var(--text-tertiary);">Downloads</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="star-rating">${stars(n.rating)}</div>
        <div style="font-size:12px;font-weight:600;color:var(--text-secondary);">${n.rating}/5</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;">
        ${n.tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}
      </div>
      <button onclick="toast('⬇️ Downloading ${n.title}...')" style="width:100%;padding:10px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i data-lucide="download" style="width:14px;height:14px;"></i> Download
      </button>
    </div>
  `).join('');
  lucide.createIcons();
}
function filterNotes(){renderGrid();}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function submitUpload(){
  document.getElementById('upload-modal').classList.remove('open');
  toast('✅ Notes uploaded successfully!');
}
document.addEventListener('DOMContentLoaded',()=>{
  auth.ensureDemo();
  buildSidebar('sidebar');
  renderGrid();
  document.getElementById('chips').addEventListener('click',e=>{
    const c=e.target.closest('.chip');if(!c)return;
    document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');currentFilter=c.dataset.f;renderGrid();
  });
  lucide.createIcons();
});
</script>
</body>
</html>
