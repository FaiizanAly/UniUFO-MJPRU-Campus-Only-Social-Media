<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In | UniUFO — Your Campus, Your Community</title>
  <meta name="description" content="Sign in to UniUFO — the secure campus-only social platform for MJPRU, Bareilly students.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 16px 40px;background:var(--bg-primary);position:relative;overflow:hidden; }
    .auth-orb  { position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0; }
    .auth-card { background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-2xl);padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);position:relative;z-index:1;animation:fadeInUp 0.5s ease both; }
    @media(max-width:480px){ .auth-card { padding:28px 20px; border-radius:var(--radius-xl); } }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo { display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px; }
    .auth-logo-text { font-size:24px;font-weight:800;color:var(--text-primary); }
    .auth-heading  { font-size:24px;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:6px;letter-spacing:-0.5px; }
    .auth-subtext  { font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:28px; }
    .pw-wrapper    { position:relative; }
    .pw-toggle     { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-tertiary);display:flex;align-items:center;padding:4px; }
    .pw-toggle:hover { color:var(--text-primary); }
    .divider-line  { display:flex;align-items:center;gap:12px;margin:20px 0; }
    .divider-line::before,.divider-line::after { content:'';flex:1;height:1px;background:var(--border-light); }
    .divider-line span { font-size:12px;color:var(--text-tertiary);white-space:nowrap; }
    .social-btn    { width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border:1.5px solid var(--border-light);border-radius:var(--radius-lg);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s; }
    .social-btn:hover { background:var(--bg-tertiary);border-color:var(--border-dark); }
    .error-box     { background:#fff1f0;border:1px solid #ffccc7;border-radius:var(--radius-lg);padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:16px;display:none; }
    .mjpru-note    { font-size:12px;color:var(--text-tertiary);text-align:center;margin-top:20px;line-height:1.6; }
  </style>
</head>
<body>
  <main class="auth-page">
    <div class="auth-orb" style="width:400px;height:400px;top:-120px;right:-100px;background:radial-gradient(circle,rgba(37,99,235,.15) 0%,transparent 70%);"></div>
    <div class="auth-orb" style="width:350px;height:350px;bottom:-80px;left:-120px;background:radial-gradient(circle,rgba(88,86,214,.12) 0%,transparent 70%);"></div>

    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <img src="logo.png" alt="UniUFO Logo" width="52" height="52" style="object-fit:contain;">
        <span class="auth-logo-text">Uni<span style="color:#2563eb;">UFO</span></span>
      </div>

      <h1 class="auth-heading">Welcome back 👋</h1>
      <p class="auth-subtext">Sign in to your UniUFO campus account</p>

      <div class="error-box" id="error-msg" role="alert">
        ❌ Incorrect email or password. Please try again.
      </div>

      <form id="login-form" novalidate>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label" for="login-email">University Email</label>
          <input
            id="login-email"
            class="input-field"
            type="email"
            placeholder="yourname@mjpru.ac.in"
            autocomplete="email"
            required
          >
        </div>
        <div class="form-group" style="margin-bottom:6px;">
          <label class="form-label" for="login-password">Password</label>
          <div class="pw-wrapper">
            <input
              id="login-password"
              class="input-field"
              type="password"
              placeholder="Enter password"
              autocomplete="current-password"
              style="padding-right:44px;"
              required
            >
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <i data-lucide="eye" id="pw-icon" style="width:18px;height:18px;"></i>
            </button>
          </div>
        </div>

        <div style="text-align:right;margin-bottom:20px;">
          <a href="#" style="font-size:13px;color:var(--accent-blue);">Forgot password?</a>
        </div>

        <button type="submit" id="login-btn" class="btn-primary" style="width:100%;justify-content:center;padding:13px;">
          Sign In
        </button>
      </form>

      <div class="divider-line"><span>or</span></div>

      <button class="social-btn" onclick="alert('Google sign-in coming soon!')">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.1 29.7 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 2.9l6.1-6.1C34.5 5.9 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.2-4z"/></svg>
        Continue with Google
      </button>

      <p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-top:20px;">
        Don't have an account? <a href="register.html" style="color:var(--accent-blue);font-weight:600;">Register free</a>
      </p>


      <p class="mjpru-note">🎓 MJPRU students only · @mjpru.ac.in email required</p>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      lucide.createIcons();

      // If already logged in, go to feed
      if (auth.isLoggedIn()) {
        window.location.href = 'feed.html';
        return;
      }

      // Password show/hide
      const pwToggle = document.getElementById('pw-toggle');
      const pwInput  = document.getElementById('login-password');
      const pwIcon   = document.getElementById('pw-icon');
      let   pwVisible = false;

      pwToggle.addEventListener('click', function () {
        pwVisible = !pwVisible;
        pwInput.type = pwVisible ? 'text' : 'password';
        pwIcon.setAttribute('data-lucide', pwVisible ? 'eye-off' : 'eye');
        lucide.createIcons();
      });

      // Login form
      const form     = document.getElementById('login-form');
      const errMsg   = document.getElementById('error-msg');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const pass  = document.getElementById('login-password').value;

        errMsg.style.display = 'none';
        loginBtn.textContent = 'Signing in…';
        loginBtn.disabled    = true;

        // Simulate async auth (would be an API call in production)
        setTimeout(function () {
          // Check against DEMO_ACCOUNTS
          const account = DEMO_ACCOUNTS.find(
            a => a.email.toLowerCase() === email && a.password === pass
          );

          if (account) {
            auth.login(account.profile, 'uniufo-demo-token-' + account.profile.id);
            loginBtn.innerHTML  = '✅ Signed in! Redirecting…';
            loginBtn.style.background = '#34c759';
            setTimeout(() => { window.location.href = 'feed.html'; }, 700);
          } else {
            errMsg.style.display = 'block';
            loginBtn.textContent = 'Sign In';
            loginBtn.disabled    = false;
          }
        }, 800);
      });
    });
  </script>
</body>
</html>
