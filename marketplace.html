<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="UniUFO — Your Campus, Your Community. MJPRU Bareilly students platform.">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Marketplace | UniUFO</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    @media(max-width:1100px){.product-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){.product-grid{grid-template-columns:1fr}}
    .product-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-xl);overflow:hidden;transition:box-shadow .2s,transform .2s}
    .product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
    .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border-light);cursor:pointer;transition:all .15s}
    .chip:hover{background:var(--accent-blue-light);color:var(--accent-blue)}
    .chip.active{background:var(--accent-blue);color:white;border-color:var(--accent-blue)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--bg-card);border-radius:var(--radius-2xl);padding:32px;width:100%;max-width:480px;box-shadow:var(--shadow-xl);max-height:90vh;overflow-y:auto}
    .input-field{width:100%;padding:10px 14px;border:1.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;transition:border-color .2s}
    .input-field:focus{outline:none;border-color:var(--accent-blue)}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
    .toast{position:fixed;bottom:24px;right:24px;background:#1c1c1e;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);transform:translateY(20px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>
<main style="padding-top:56px;min-height:100vh;background:var(--bg-primary);">
  <div class="app-shell" style="max-width:1200px;margin:0 auto;">
    <div class="sidebar" id="sidebar" style="background:var(--bg-secondary);"></div>
    <div class="main-content" style="padding:24px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div>
          <h1 style="font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;">🛍️ Campus Marketplace</h1>
          <p style="font-size:14px;color:var(--text-secondary);margin-top:2px;">Buy &amp; sell within MJPRU campus</p>
        </div>
        <button onclick="document.getElementById('sell-modal').classList.add('open')" style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> Sell Something
        </button>
      </div>
      <div class="chips-row" id="chips" style="margin-bottom:20px;">
        <span class="chip active" data-f="All">All</span>
        <span class="chip" data-f="Electronics">📱 Electronics</span>
        <span class="chip" data-f="Books">📚 Books</span>
        <span class="chip" data-f="Appliances">🔌 Appliances</span>
        <span class="chip" data-f="Stationery">✏️ Stationery</span>
        <span class="chip" data-f="Furniture">🪑 Furniture</span>
      </div>
      <div class="product-grid" id="grid"></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="sell-modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 style="font-size:20px;font-weight:700;">List an Item for Sale</h2>
      <button onclick="document.getElementById('sell-modal').classList.remove('open')" style="background:var(--bg-secondary);border:none;cursor:pointer;color:var(--text-secondary);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <i data-lucide="x" style="width:16px;height:16px;"></i>
      </button>
    </div>
    <div class="form-group"><label class="form-label">Item Title *</label><input type="text" class="input-field" placeholder="e.g. Dell Laptop i5 8GB RAM"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">Price (₹) *</label><input type="number" class="input-field" placeholder="e.g. 5000"></div>
      <div class="form-group"><label class="form-label">Category *</label>
        <select class="input-field"><option>Electronics</option><option>Books</option><option>Appliances</option><option>Stationery</option><option>Furniture</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Condition *</label>
      <select class="input-field"><option>Like New</option><option>Good</option><option>Used</option></select>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="input-field" rows="3" placeholder="Describe your item — condition, specs, what's included..."></textarea></div>
    <div class="form-group"><label class="form-label">Pickup Location</label><input type="text" class="input-field" placeholder="e.g. CSIT Dept., MJPRU Campus"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button onclick="document.getElementById('sell-modal').classList.remove('open')" style="flex:1;padding:12px;background:var(--bg-secondary);color:var(--text-primary);border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
      <button onclick="submitListing()" style="flex:1;padding:12px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;">Post Listing</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
const catIcons={Electronics:'💻',Books:'📚',Appliances:'❄️',Stationery:'✏️',Furniture:'🪑'};
function condBadge(c){
  const s={background:'#e6f9ee',color:'#1a7f3c'};
  if(c==='Good'){s.background='#fff3e0';s.color='#e65100';}
  if(c==='Used'){s.background='#ffeef0';s.color='#c0392b';}
  return `<span style="background:${s.background};color:${s.color};border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600;">${c}</span>`;
}
function renderGrid(f){
  const g=document.getElementById('grid');
  const list=f==='All'?products:products.filter(p=>p.category===f);
  if(!list.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-tertiary);"><div style="font-size:48px;">🔍</div><p style="margin-top:12px;font-size:16px;font-weight:600;">No items here</p></div>';return;}
  g.innerHTML=list.map(p=>`
    <div class="product-card">
      <div style="height:120px;display:flex;align-items:center;justify-content:center;background:${p.bgColor};font-size:52px;">${catIcons[p.category]||'📦'}</div>
      <div style="padding:14px 16px 16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:11px;font-weight:600;color:${p.iconColor};background:${p.bgColor};padding:3px 8px;border-radius:999px;">${p.category}</span>
          ${condBadge(p.condition)}
        </div>
        <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px;line-height:1.3;">${p.title}</div>
        <div style="font-size:22px;font-weight:800;color:var(--accent-blue);margin-bottom:10px;">₹${p.price.toLocaleString('en-IN')}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5;">${p.description.length>80?p.description.slice(0,80)+'…':p.description}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:${p.seller.avatarColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;">${p.seller.initials}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text-primary);">${p.seller.name}${p.seller.verified?' <span style="color:#0071e3;">✓</span>':''}</div>
          <div style="margin-left:auto;font-size:11px;color:var(--text-tertiary);">${p.time}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-tertiary);margin-bottom:14px;">
          <i data-lucide="map-pin" style="width:12px;height:12px;"></i> ${p.location}
        </div>
        <button onclick="toast('📱 Opening chat with ${p.seller.name}...')" style="width:100%;padding:10px;background:var(--accent-blue);color:white;border:none;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;">Contact Seller</button>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function submitListing(){
  document.getElementById('sell-modal').classList.remove('open');
  toast('✅ Your listing has been posted!');
}
document.addEventListener('DOMContentLoaded',()=>{
  auth.ensureDemo();
  buildSidebar('sidebar');
  renderGrid('All');
  document.getElementById('chips').addEventListener('click',e=>{
    const c=e.target.closest('.chip');if(!c)return;
    document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');renderGrid(c.dataset.f);
  });
  lucide.createIcons();
});
</script>
</body>
</html>
