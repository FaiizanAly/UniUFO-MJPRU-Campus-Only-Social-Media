<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="UniUFO — Your Campus, Your Community. MJPRU Bareilly students platform.">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Messages | UniUFO</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .msg-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 56px);
    }
    .conv-list {
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      overflow: hidden;
    }
    .mobile-back-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: none;
      border-bottom: 1px solid var(--border-light);
      color: var(--accent-blue);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    @media (max-width: 768px) {
      .msg-shell { grid-template-columns: 1fr; height: auto; }
      .conv-list  { min-height: calc(100vh - 56px); }
      .chat-window { min-height: calc(100vh - 56px); }
      .mobile-back-btn { display: flex; }
      .messages-area { height: calc(100vh - 200px); }
    }
    .conv-list-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }
    .conv-items { overflow-y: auto; flex: 1; }
    .conv-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; cursor: pointer;
      transition: background 0.2s; border-bottom: 1px solid var(--border-light);
    }
    .conv-item:hover { background: var(--bg-card); }
    .conv-item.active { background: var(--accent-blue-light); }
    .chat-window {
      display: flex; flex-direction: column;
      background: var(--bg-primary);
    }
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-row.sent .bubble-sent { margin-left: auto; }
    .chat-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border-light);
      background: var(--bg-card);
      display: flex; align-items: flex-end; gap: 10px;
      flex-shrink: 0;
    }
    .unread-badge {
      background: var(--accent-blue); color: white;
      border-radius: 999px; font-size: 10px; font-weight: 700;
      padding: 2px 6px; min-width: 18px; text-align: center;
    }
    @media (max-width: 768px) {
      .msg-shell { grid-template-columns: 1fr; }
      .conv-list { display: none; }
    }
  </style>
</head>
<body>
  <main style="padding-top:56px;">
    <div class="msg-shell">

      <!-- LEFT: Conversations -->
      <div class="conv-list" id="conv-panel">
        <div class="conv-list-header">
          <div style="font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:10px;">Messages</div>
          <input class="input-field" style="font-size:13px;padding:8px 12px;" placeholder="🔍  Search messages..." id="conv-search" oninput="filterConvs()">
        </div>
        <div class="conv-items" id="conv-items"></div>
      </div>

      <!-- RIGHT: Chat Window -->
      <div class="chat-window" id="chat-panel" style="display:none;">
        <button class="mobile-back-btn" onclick="showConvList()">
          <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Back
        </button>
        <div class="chat-header" id="chat-header"></div>
        <div class="messages-area" id="messages-area"></div>
        <div class="chat-input-bar">
          <button class="btn-ghost" style="padding:8px;border-radius:10px;flex-shrink:0;" title="Attach">
            <i data-lucide="paperclip"></i>
          </button>
          <textarea id="msg-input" class="input-field" rows="1"
            style="resize:none;min-height:40px;max-height:120px;padding:10px 14px;flex:1;"
            placeholder="Type a message..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="btn-primary" style="padding:10px 16px;border-radius:12px;flex-shrink:0;" onclick="sendMessage()">
            <i data-lucide="send"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    let activeConvId = 'cv1';
    let localMessages = [...chatMessages];

    function renderConvs(filter = '') {
      const container = document.getElementById('conv-items');
      container.innerHTML = conversations
        .filter(c => c.user.name.toLowerCase().includes(filter.toLowerCase()))
        .map(c => `
          <div class="conv-item ${c.id === activeConvId ? 'active' : ''}"
               onclick="selectConv('${c.id}')" id="conv-${c.id}">
            <div style="position:relative;flex-shrink:0;">
              <div style="width:40px;height:40px;border-radius:50%;background:${c.user.avatarColor};display:flex;align-items:center;justify-content:center;">
                <span style="color:white;font-size:13px;font-weight:700;">${c.user.initials}</span>
              </div>
              ${c.user.online ? `<span class="online-dot" style="position:absolute;bottom:0;right:0;"></span>` : ''}
            </div>
            <div style="flex:1;overflow:hidden;">
              <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;">
                <span style="font-size:14px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.user.name}</span>
                ${c.user.verified ? `<div style="width:13px;height:13px;border-radius:50%;background:var(--accent-blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="check" style="width:8px;height:8px;color:white;"></i></div>` : ''}
              </div>
              <div style="font-size:12px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.lastMessage}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
              <span style="font-size:11px;color:var(--text-tertiary);">${c.time}</span>
              ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
            </div>
          </div>
        `).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function renderChat() {
      const conv = conversations.find(c => c.id === activeConvId);
      if (!conv) return;

      // Header
      document.getElementById('chat-header').innerHTML = `
        <div style="position:relative;">
          <div style="width:38px;height:38px;border-radius:50%;background:${conv.user.avatarColor};display:flex;align-items:center;justify-content:center;">
            <span style="color:white;font-size:12px;font-weight:700;">${conv.user.initials}</span>
          </div>
          ${conv.user.online ? `<span class="online-dot" style="position:absolute;bottom:0;right:0;"></span>` : ''}
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:15px;font-weight:600;color:var(--text-primary);">${conv.user.name}</span>
            ${conv.user.verified ? `<div style="width:14px;height:14px;border-radius:50%;background:var(--accent-blue);display:flex;align-items:center;justify-content:center;"><i data-lucide="check" style="width:9px;height:9px;color:white;"></i></div>` : ''}
          </div>
          <div style="font-size:12px;color:${conv.user.online ? '#34c759' : 'var(--text-tertiary)'};">
            ${conv.user.online ? '● Online' : 'Offline'}
          </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:4px;">
          <button class="btn-ghost" style="padding:8px;border-radius:10px;" title="Call"><i data-lucide="phone"></i></button>
          <button class="btn-ghost" style="padding:8px;border-radius:10px;" title="Info"><i data-lucide="info"></i></button>
        </div>
      `;

      // Messages
      const area = document.getElementById('messages-area');
      area.innerHTML = localMessages.map(m => `
        <div class="msg-row ${m.sent ? 'sent' : ''}">
          ${!m.sent ? `
            <div style="width:30px;height:30px;border-radius:50%;background:${conv.user.avatarColor};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="color:white;font-size:10px;font-weight:700;">${conv.user.initials}</span>
            </div>` : ''}
          <div>
            <div class="${m.sent ? 'bubble-sent' : 'bubble-received'}">${m.text}</div>
            <div style="font-size:10px;color:var(--text-tertiary);margin-top:3px;text-align:${m.sent ? 'right' : 'left'};">${m.time}</div>
          </div>
        </div>
      `).join('');
      area.scrollTop = area.scrollHeight;

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function showConvList() {
      const cp = document.getElementById('chat-panel');
      const pp = document.getElementById('conv-panel');
      if (window.innerWidth <= 768) {
        if (cp) cp.style.display = 'none';
        if (pp) pp.style.display = 'flex';
        pp.style.flexDirection = 'column';
      }
    }
    function showChatPanel() {
      const cp = document.getElementById('chat-panel');
      const pp = document.getElementById('conv-panel');
      if (window.innerWidth <= 768) {
        if (pp) pp.style.display = 'none';
        if (cp) cp.style.display = 'flex';
        cp.style.flexDirection = 'column';
      } else {
        if (cp) cp.style.display = 'flex';
        cp.style.flexDirection = 'column';
      }
    }
    function selectConv(id) {
      activeConvId = id;
      const conv = conversations.find(c => c.id === id);
      if (conv) conv.unread = 0;
      renderConvs();
      renderChat();
      showChatPanel();
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      localMessages.push({ id: 'msg' + Date.now(), sent: true, text, time });
      input.value = '';
      renderChat();
    }

    function filterConvs() {
      renderConvs(document.getElementById('conv-search').value);
    }

    document.addEventListener('DOMContentLoaded', () => {
      auth.ensureDemo();
      renderConvs();
      // Desktop: show chat panel by default
      if (window.innerWidth > 768) {
        const cp = document.getElementById('chat-panel');
        if (cp) { cp.style.display = 'flex'; cp.style.flexDirection = 'column'; }
        renderChat();
      }
      // Handle resize
      window.addEventListener('resize', () => {
        const cp = document.getElementById('chat-panel');
        const pp = document.getElementById('conv-panel');
        if (window.innerWidth > 768) {
          if (cp) { cp.style.display = 'flex'; cp.style.flexDirection = 'column'; }
          if (pp) pp.style.display = 'flex';
          renderChat();
        } else {
          if (pp) { pp.style.display = 'flex'; pp.style.flexDirection = 'column'; }
          if (cp) cp.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
