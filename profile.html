<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="UniUFO — Your Campus, Your Community. MJPRU Bareilly students platform.">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Profile | UniUFO</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-banner {
      height: 200px;
      background: linear-gradient(135deg, #0071e3 0%, #5856d6 50%, #af52de 100%);
      position: relative;
    }
    .profile-avatar-wrap {
      position: absolute;
      bottom: -50px;
      left: 32px;
    }
    .profile-avatar-img {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 4px solid var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: white;
    }
    .profile-body { padding: 64px 32px 32px; max-width: 860px; margin: 0 auto; }
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent;
      color: var(--text-secondary); font-size: 14px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
    .tab-btn:hover { color: var(--text-primary); }
    .stat-box { text-align: center; cursor: pointer; padding: 8px 20px; border-radius: var(--radius-lg); transition: background 0.2s; }
    .stat-box:hover { background: var(--bg-secondary); }
  </style>
</head>
<body>
  <main style="padding-top:56px;min-height:100vh;background:var(--bg-primary);">

    <!-- Banner -->
    <div class="profile-banner">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar-img" id="profile-avatar"></div>
      </div>
      <div style="position:absolute;top:16px;right:16px;display:flex;gap:8px;">
        <button class="btn-secondary" style="font-size:13px;padding:8px 16px;backdrop-filter:blur(8px);background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3);color:white;" onclick="document.getElementById('edit-modal').style.display='flex'">
          <i data-lucide="edit-2" style="width:14px;height:14px;"></i> Edit Profile
        </button>
      </div>
    </div>

    <!-- Profile Body -->
    <div class="profile-body">

      <!-- Name & Info -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h1 id="profile-name" style="font-size:24px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);"></h1>
            <div id="verified-badge" style="display:none;background:var(--accent-blue);border-radius:999px;padding:3px 10px;display:flex;align-items:center;gap:4px;">
              <i data-lucide="shield-check" style="width:12px;height:12px;color:white;"></i>
              <span style="color:white;font-size:11px;font-weight:600;">MJPRU Verified</span>
            </div>
          </div>
          <div id="profile-username" style="font-size:14px;color:var(--text-tertiary);margin-top:2px;"></div>
          <div id="creator-badge" style="display:none;margin-top:8px;"></div>
          <div id="admin-badge"   style="display:none;margin-top:6px;"></div>
        </div>
        <button class="btn-primary" style="font-size:13px;padding:9px 20px;">
          <i data-lucide="message-circle" style="width:14px;height:14px;"></i> Message
        </button>
      </div>

      <!-- Bio -->
      <p id="profile-bio" style="font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:560px;margin-bottom:16px;"></p>

      <!-- Meta tags -->
      <div id="profile-meta" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;"></div>

      <!-- Stats -->
      <div style="display:flex;gap:0;padding:16px 0;border-top:1px solid var(--border-light);border-bottom:1px solid var(--border-light);margin-bottom:20px;">
        <div class="stat-box" onclick="alert('Posts list coming soon!')">
          <div id="stat-posts" style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);"></div>
          <div style="font-size:12px;color:var(--text-tertiary);">Posts</div>
        </div>
        <div class="stat-box" onclick="alert('Followers list coming soon!')">
          <div id="stat-followers" style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);"></div>
          <div style="font-size:12px;color:var(--text-tertiary);">Followers</div>
        </div>
        <div class="stat-box" onclick="alert('Following list coming soon!')">
          <div id="stat-following" style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);"></div>
          <div style="font-size:12px;color:var(--text-tertiary);">Following</div>
        </div>
        <div class="stat-box">
          <div id="stat-joined" style="font-size:14px;font-weight:600;color:var(--text-primary);padding-top:3px;"></div>
          <div style="font-size:12px;color:var(--text-tertiary);">Joined</div>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border-light);margin-bottom:20px;">
        <button class="tab-btn active" id="tab-posts"    onclick="switchTab('posts')">Posts</button>
        <button class="tab-btn"        id="tab-notes"    onclick="switchTab('notes')">Notes</button>
        <button class="tab-btn"        id="tab-activity" onclick="switchTab('activity')">Activity</button>
      </div>

      <!-- Tab Content -->
      <div id="tab-content"></div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-size:18px;font-weight:700;color:var(--text-primary);">Edit Profile</h2>
        <button onclick="document.getElementById('edit-modal').style.display='none'" style="background:none;border:none;color:var(--text-tertiary);cursor:pointer;"><i data-lucide="x"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="input-field" id="edit-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea class="input-field" id="edit-bio" rows="3" placeholder="Tell MJPRU about yourself..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Semester</label>
          <select class="input-field" id="edit-semester">
            <option>1st Semester</option><option>2nd Semester</option>
            <option>3rd Semester</option><option>4th Semester</option>
            <option>5th Semester</option><option>6th Semester</option>
          </select>
        </div>
        <button class="btn-primary" style="width:100%;padding:13px;" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    let profileUser = null;

    function renderProfile() {
      profileUser = auth.ensureDemo();
      if (!profileUser) return;

      // Avatar
      const avatar = document.getElementById('profile-avatar');
      avatar.style.background = profileUser.avatarColor || 'linear-gradient(135deg,#0071e3,#5856d6)';
      avatar.textContent = profileUser.initials || '?';

      document.getElementById('profile-name').textContent = profileUser.name || '';
      document.getElementById('profile-username').textContent = '@' + (profileUser.username || profileUser.name.toLowerCase().replace(/ /g,'.'));
      document.getElementById('profile-bio').textContent = profileUser.bio || '';

      // Verified badge
      if (profileUser.verified) {
        document.getElementById('verified-badge').style.display = 'flex';
      }

      // Creator badge — ONLY for admin/creator account
      const creatorBadge = document.getElementById('creator-badge');
      if (profileUser.isCreator) {
        creatorBadge.innerHTML = `
          <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:linear-gradient(135deg,#ff9f0a,#ff6b00);color:white;font-size:12px;font-weight:600;">
            ⭐ Creator of UniUFO
          </span>`;
        creatorBadge.style.display = 'block';
      } else {
        creatorBadge.style.display = 'none';
      }

      // Admin badge — extra badge for admin users
      const adminBadge = document.getElementById('admin-badge');
      if (adminBadge) {
        if (profileUser.isAdmin) {
          adminBadge.innerHTML = `
            <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:linear-gradient(135deg,#0071e3,#5856d6);color:white;font-size:11px;font-weight:700;">
              🛡️ Admin · UniUFO
            </span>`;
          adminBadge.style.display = 'block';
        } else {
          adminBadge.style.display = 'none';
        }
      }

      // Meta tags — use logged-in user's data
      document.getElementById('profile-meta').innerHTML = `
        <span class="tag"><i data-lucide="graduation-cap" style="width:12px;height:12px;margin-right:4px;"></i>${profileUser.degree || ''}</span>
        <span class="tag"><i data-lucide="map-pin" style="width:12px;height:12px;margin-right:4px;"></i>MJPRU, Bareilly</span>
        <span class="tag"><i data-lucide="book-open" style="width:12px;height:12px;margin-right:4px;"></i>${profileUser.department || ''}</span>
        <span class="tag"><i data-lucide="calendar" style="width:12px;height:12px;margin-right:4px;"></i>${profileUser.semester || ''}</span>
        <span class="tag"><i data-lucide="mail" style="width:12px;height:12px;margin-right:4px;"></i>${profileUser.email || ''}</span>`;

      // Stats — use logged-in user's data
      document.getElementById('stat-posts').textContent     = profileUser.posts     || 0;
      document.getElementById('stat-followers').textContent = profileUser.followers  || 0;
      document.getElementById('stat-following').textContent = profileUser.following  || 0;
      document.getElementById('stat-joined').textContent    = profileUser.joinedAt   || '—';

      // Edit form prefill
      document.getElementById('edit-name').value     = profileUser.name     || '';
      document.getElementById('edit-bio').value      = profileUser.bio      || '';
      document.getElementById('edit-semester').value = profileUser.semester || '';

      switchTab('posts');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function switchTab(tab) {
      ['posts','notes','activity'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      });
      const content = document.getElementById('tab-content');

      if (tab === 'posts') {
        content.innerHTML = posts.map(post => `
          <div class="card" style="padding:20px;margin-bottom:12px;">
            <p style="font-size:14px;color:var(--text-primary);line-height:1.65;margin-bottom:10px;">${post.content}</p>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
              ${post.tags.map(t => `<span style="font-size:12px;color:var(--accent-blue);">#${t}</span>`).join('')}
            </div>
            <div style="display:flex;gap:16px;font-size:13px;color:var(--text-tertiary);border-top:1px solid var(--border-light);padding-top:10px;">
              <span>❤️ ${post.likes}</span>
              <span>💬 ${post.comments}</span>
              <span>📤 ${post.shares}</span>
              <span style="margin-left:auto;">${post.time}</span>
            </div>
          </div>`).join('');

      } else if (tab === 'notes') {
        content.innerHTML = notes.filter(n => n.uploader.name === 'Faizan Ali').map(note => `
          <div class="card" style="padding:20px;margin-bottom:12px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <span class="badge badge-blue">${note.subject}</span>
              <span class="tag">${note.semester}</span>
            </div>
            <div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:6px;">${note.title}</div>
            <div style="display:flex;gap:16px;font-size:12px;color:var(--text-tertiary);">
              <span>📄 ${note.pages} pages</span>
              <span>⬇️ ${note.downloads} downloads</span>
              <span>⭐ ${note.rating}</span>
              <span>${note.size}</span>
            </div>
          </div>`).join('') || `<div class="empty-state"><i data-lucide="file-text" style="width:36px;height:36px;"></i><p>No notes uploaded yet</p></div>`;

      } else {
        content.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${['Joined UniUFO — Aug 2023','Uploaded "Data Structures Notes"','Liked Priya\'s post about ML project','Registered for TECHNO-2026','Followed Rahul Verma'].map((a,i) => `
              <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-lg);">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <i data-lucide="activity" style="width:16px;height:16px;color:var(--accent-blue);"></i>
                </div>
                <div>
                  <div style="font-size:13px;color:var(--text-primary);font-weight:500;">${a}</div>
                  <div style="font-size:11px;color:var(--text-tertiary);">${i === 0 ? '3 years ago' : i + ' months ago'}</div>
                </div>
              </div>`).join('')}
          </div>`;
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function saveProfile() {
      const name     = document.getElementById('edit-name').value.trim();
      const bio      = document.getElementById('edit-bio').value.trim();
      const semester = document.getElementById('edit-semester').value;
      if (!name) { alert('Name cannot be empty!'); return; }

      const user = auth.getUser();
      user.name = name;
      auth.login(user);
      currentUser.bio      = bio;
      currentUser.semester = semester;

      document.getElementById('edit-modal').style.display = 'none';
      renderProfile();
      alert('✅ Profile updated!');
    }

    document.addEventListener('DOMContentLoaded', renderProfile);
  </script>
</body>
</html>
